<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <title>White water Rafting Company</title>
</head>

<body>
   <header>
      <img src="images/zdownriver.png" alt="Downriver logo" width="150">
      <nav>
         <a href="index.html">Home</a>
         <a href="about.html">About Us</a>
         <a href="trips.html">Trips</a>
         <a href="contact.html">Contact Us</a>
      </nav>
   </header>

   <main class="contact-main">
      <div class="contact">
         <p>White Water Rafting</p>
         <p>Phone: 893-397-564</p>
         <p>Email: <a href="     ">Watercraftingriver@gmail.com</a></p>

      </div>


      <div>
         <div class="map">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d12112.866948169001!2d-105.10944977211196!3d40.62510195361933!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x876935bde465b747%3A0xc6abb77a9179543e!2sRocky%20Mountain%20Adventures!5e0!3m2!1sen!2sbr!4v1775330369123!5m2!1sen!2sbr"
              width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>
         </div>

         <div class="form">
            <form>
               <label for="name">NAME</label>
               <input type="text" id="name" name="name">
               <label for="email">EMAIL</label>
               <input type="email" id="email" name="email">
               <label for="purpose">PURPOSE</label>
               <select name="purpose" id="purpose">
                  <option value="">Select purpose Of Contact</option>
                  <option value="General Inquiry">General Inquiry</option>
                  <option value="Reservation Question">Reservation Question</option>
                  <option value="Website Suggestion">Website Suggestion</option>
               </select>
               <label for="message">Message</label>
               <textarea name="message" id="message" cols="30" rows="10"></textarea>

               <div class="form_radio">
                  <label for="infant">Infant</label>
                  <input type="radio" id="infant" name="infant">
                  <label for="teenager">Teenager</label>
                  <input type="radio" id="teenager" name="teenager">
                  <label for="adult">Adult</label>
                  <input type="radio" id="adult" name="adult">
               </div>
               <div class="form_checkbox">
                  <label for="subscribe">Please subscribe me to the monthly newsletter</label>
                  <input type="checkbox" id="subscribe" name="subscribe" class="subscribe">
               </div>


               <button type="submit">SEND</button>
            </form>
         </div>

      </div>


      <section>
         <h1>We are here to serve you</h1>
         <img src="images/wearing-a-suit.jpg" alt=I am ready to help you>
         <img src="images/african-american-business-woman-talking-phone-cafe_1303-9875.avif "
           alt="can I assist you?">
         <img
           src="images/woman-happy-middle-aged-cute-smiling-walking-lake-river-sea-side-258385540.webp"
           alt="a happy woman">
      </section>

      </div>


   </main>

   <footer>

</body>

</html>
